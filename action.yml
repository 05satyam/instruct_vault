name: "InstructVault"
description: "Validate, evaluate, lint, and (optionally) lock-check prompts with InstructVault."
branding:
  icon: "check-circle"
  color: "purple"
inputs:
  prompts:
    description: "Path to the prompts directory."
    required: false
    default: "prompts"
  version:
    description: "InstructVault version to install (e.g. '0.6.0'). Empty installs the latest."
    required: false
    default: ""
  eval:
    description: "Run `ivault eval` on every prompt (deterministic; no network)."
    required: false
    default: "true"
  lockfile:
    description: "Path to a lockfile to verify against. Skipped if empty or missing."
    required: false
    default: ""
  lint:
    description: "Run `ivault lint --format md` and append the scorecard to the GitHub Actions job summary."
    required: false
    default: "true"
  fail-under:
    description: "If set, fail the lint check when the highest-severity finding is at or above this level (error, warning, info). When empty, lint only reports."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install InstructVault
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          python -m pip install "instructvault==${{ inputs.version }}"
        else
          python -m pip install instructvault
        fi
    - name: Validate prompts
      shell: bash
      run: ivault validate "${{ inputs.prompts }}"
    - name: Lint prompts (scorecard)
      if: ${{ inputs.lint == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "## InstructVault Prompt Lint" >> "$GITHUB_STEP_SUMMARY"
        echo "" >> "$GITHUB_STEP_SUMMARY"
        if [ -n "${{ inputs.fail-under }}" ]; then
          ivault lint "${{ inputs.prompts }}" --format md \
            --fail-under "${{ inputs.fail-under }}" >> "$GITHUB_STEP_SUMMARY"
        else
          ivault lint "${{ inputs.prompts }}" --format md >> "$GITHUB_STEP_SUMMARY"
        fi
    - name: Evaluate prompts
      if: ${{ inputs.eval == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        find "${{ inputs.prompts }}" -type f \( -name '*.prompt.yml' -o -name '*.prompt.yaml' -o -name '*.prompt.json' \) -print0 \
          | while IFS= read -r -d '' f; do
              echo "::group::eval $f"
              ivault eval "$f"
              echo "::endgroup::"
            done
    - name: Verify lockfile
      if: ${{ inputs.lockfile != '' }}
      shell: bash
      run: |
        if [ -f "${{ inputs.lockfile }}" ]; then
          ivault verify "${{ inputs.lockfile }}" --prompts "${{ inputs.prompts }}"
        else
          echo "Lockfile '${{ inputs.lockfile }}' not found; skipping verify."
        fi
